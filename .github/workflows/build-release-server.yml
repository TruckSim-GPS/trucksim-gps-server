name: Build & Release Server Installer

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-attach:
    runs-on: windows-latest
    # Scopes the OIDC token's subject claim to the "release" GitHub environment
    # (repo:TruckSim-GPS/trucksim-gps-server:environment:release) so one Azure
    # federated credential matches every release tag and every manual dispatch,
    # regardless of ref name. Environment is auto-created on first run.
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore source/Funbit.Ets.Telemetry.sln

      - name: Build Release
        run: msbuild source/Funbit.Ets.Telemetry.sln /p:Configuration=Release

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign application binaries
        uses: azure/artifact-signing-action@v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: cocoasandwich
          certificate-profile-name: cocoasandwich-codesigning
          files: |
            ${{ github.workspace }}/source/Funbit.Ets.Telemetry.Server/bin/Release/TruckSimGPS_Server.exe
            ${{ github.workspace }}/source/Funbit.Ets.Telemetry.Server/bin/Release/TruckSimGPSPlugins/win_x64/plugins/trucksim-gps-telemetry.dll
            ${{ github.workspace }}/source/Funbit.Ets.Telemetry.Server/bin/Release/TruckSimGPSPlugins/win_x86/plugins/trucksim-gps-telemetry.dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify application binaries are signed
        shell: pwsh
        run: |
          $files = @(
            "source/Funbit.Ets.Telemetry.Server/bin/Release/TruckSimGPS_Server.exe",
            "source/Funbit.Ets.Telemetry.Server/bin/Release/TruckSimGPSPlugins/win_x64/plugins/trucksim-gps-telemetry.dll",
            "source/Funbit.Ets.Telemetry.Server/bin/Release/TruckSimGPSPlugins/win_x86/plugins/trucksim-gps-telemetry.dll"
          )
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature $f
            if ($sig.Status -ne 'Valid') {
              Write-Error "Signature invalid for $f : $($sig.Status)"
              exit 1
            }
            Write-Output "Signature valid: $f"
          }

      - name: Download VC++ Redistributable
        run: Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile installer/vc_redist.x64.exe

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Extract version from AssemblyInfo
        id: version
        run: |
          $content = Get-Content "source/Funbit.Ets.Telemetry.Server/Properties/AssemblyInfo.cs" -Raw
          $match = [regex]::Match($content, 'AssemblyVersion\("(\d+\.\d+\.\d+)')
          echo "VERSION=$($match.Groups[1].Value)" >> $env:GITHUB_OUTPUT

      - name: Compile installer
        run: iscc /DAppVersion=${{ steps.version.outputs.VERSION }} installer/TruckSimGPS_Server.iss

      - name: Sign installer
        uses: azure/artifact-signing-action@v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: cocoasandwich
          certificate-profile-name: cocoasandwich-codesigning
          files-folder: ${{ github.workspace }}/installer/Output
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify installer is signed
        shell: pwsh
        run: |
          $files = @(Get-Item "installer/Output/TruckSimGPS_Server_Setup_*.exe")
          if ($files.Count -ne 1) { Write-Error "Expected 1 installer, found $($files.Count)"; exit 1 }
          $sig = Get-AuthenticodeSignature $files[0].FullName
          if ($sig.Status -ne 'Valid') {
            Write-Error "Installer signature invalid: $($sig.Status)"
            exit 1
          }
          Write-Output "Signature valid: $($sig.SignerCertificate.Subject)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TruckSimGPS_Server_Setup
          path: installer/Output/TruckSimGPS_Server_Setup_*.exe

      - name: Attach installer to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: installer/Output/TruckSimGPS_Server_Setup_*.exe
